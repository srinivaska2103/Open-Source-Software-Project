<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/code (2).png">
    <title>Coming Soon | DEV BASE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); }
        @keyframes pulse-slow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
        .bg-glow { animation: pulse-slow 8s infinite; }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen flex flex-col transition-colors duration-500 overflow-hidden">

    <header class="fixed top-0 w-full z-50 p-6 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2 group transition-all">
            <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/30 group-hover:rotate-12 transition-transform">
                <i class="fas fa-code text-xl"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">DEV <span class="text-primary">BASE</span></span>
        </a>

        <div class="flex gap-3">
            <button onclick="toggleDir()" class="h-10 px-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm text-xs font-bold hover:border-primary transition-all">
                <span id="dir-text">LTR</span>
            </button>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center hover:border-primary transition-all">
                <i id="theme-icon" class="fas fa-moon text-primary"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow flex flex-col items-center justify-center p-6 relative">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/20 blur-[120px] rounded-full bg-glow -z-10"></div>

        <div class="max-w-3xl w-full text-center">
            <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-primary/10 text-primary border border-primary/20 mb-8">
                <i class="fas fa-tools text-xs"></i>
                <span class="text-[10px] font-black uppercase tracking-[0.2em]">Deployment in Progress</span>
            </div>

            <h1 class="text-4xl md:text-7xl font-black mb-6 tracking-tight leading-none">
                Something <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-purple-500">Legendary</span> <br>is Brewing.
            </h1>
            
            <p class="text-slate-500 dark:text-slate-400 text-lg mb-12 max-w-xl mx-auto leading-relaxed">
                Our developers are currently committing the final touches to the DEV BASE ecosystem. Join the waitlist to get early beta access.
            </p>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-16">
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 dark:shadow-none">
                    <div id="days" class="text-3xl md:text-4xl font-black text-primary mb-1">00</div>
                    <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Days</div>
                </div>
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 dark:shadow-none">
                    <div id="hours" class="text-3xl md:text-4xl font-black text-primary mb-1">00</div>
                    <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Hours</div>
                </div>
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 dark:shadow-none">
                    <div id="minutes" class="text-3xl md:text-4xl font-black text-primary mb-1">00</div>
                    <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Minutes</div>
                </div>
                <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-6 rounded-[2rem] shadow-xl shadow-slate-200/50 dark:shadow-none">
                    <div id="seconds" class="text-3xl md:text-4xl font-black text-primary mb-1">00</div>
                    <div class="text-[10px] uppercase font-bold text-slate-400 tracking-widest">Seconds</div>
                </div>
            </div>

            <form onsubmit="handleSubmit(event)" class="max-w-md mx-auto relative group">
                <input type="email" required placeholder="Enter your email address" class="w-full pl-6 pr-36 py-5 rounded-2xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-lg dark:text-white">
                <button type="submit" class="absolute right-2 top-2 bottom-2 px-6 bg-primary text-white font-bold rounded-xl hover:bg-blue-600 transition-all active:scale-95">
                    Notify Me
                </button>
                <p id="msg" class="hidden mt-4 text-green-500 font-bold text-sm animate-bounce">
                    <i class="fas fa-check-circle mr-1"></i> You're on the list!
                </p>
            </form>

            <div class="mt-16 flex justify-center gap-6 text-slate-400">
                <a href="#" class="hover:text-primary transition-colors"><i class="fab fa-discord text-xl"></i></a>
                <a href="#" class="hover:text-primary transition-colors"><i class="fab fa-github text-xl"></i></a>
                <a href="#" class="hover:text-primary transition-colors"><i class="fab fa-twitter text-xl"></i></a>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-xs font-medium text-slate-400 uppercase tracking-[0.2em]">
        &copy; 2026 DEV BASE Ecosystem
    </footer>

    <script>
        // --- 1. COUNTDOWN LOGIC ---
        const targetDate = new Date("March 20, 2026 00:00:00").getTime();

        setInterval(() => {
            const now = new Date().getTime();
            const diff = targetDate - now;

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d < 10 ? "0" + d : d;
            document.getElementById("hours").innerText = h < 10 ? "0" + h : h;
            document.getElementById("minutes").innerText = m < 10 ? "0" + m : m;
            document.getElementById("seconds").innerText = s < 10 ? "0" + s : s;
        }, 1000);

        // --- 2. THEME & DIRECTION (Local Storage) ---
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            icon.className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-primary';
        }

        function toggleDir() {
            const html = document.documentElement;
            const newDir = html.dir === 'ltr' ? 'rtl' : 'ltr';
            html.dir = newDir;
            document.getElementById('dir-text').innerText = newDir.toUpperCase();
            localStorage.setItem('dir', newDir);
        }

        // --- 3. FORM HANDLER ---
        function handleSubmit(e) {
            e.preventDefault();
            document.getElementById('msg').classList.remove('hidden');
            e.target.reset();
        }

        // --- 4. INITIALIZATION ---
        window.onload = () => {
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').className = 'fas fa-sun text-yellow-400';
            }
            const savedDir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.dir = savedDir;
            document.getElementById('dir-text').innerText = savedDir.toUpperCase();
        }
    </script>
</body>
</html>
