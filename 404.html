<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/code (2).png">
    <title>404 - Page Not Found | DEV BASE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#3b82f6' } } }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .animate-float { animation: float 4s ease-in-out infinite; }
        
        /* Interactive background glow */
        .glow {
            background: radial-gradient(circle at center, rgba(59, 130, 246, 0.15) 0%, transparent 70%);
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-white min-h-screen flex flex-col transition-colors duration-300">

    <header class="fixed top-0 w-full z-50 p-6 flex justify-between items-center">
        <a href="index.html" class="flex items-center gap-2 group transition-all">
            <div class="w-10 h-10 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-primary/30 group-hover:scale-110 transition-transform">
                <i class="fas fa-code text-xl"></i>
            </div>
            <span class="font-bold text-xl tracking-tight dark:text-white">DEV <span class="text-primary">BASE</span></span>
        </a>

        <div class="flex gap-3">
            <button onclick="toggleDir()" class="h-10 px-4 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm text-xs font-bold hover:border-primary transition-all">
                <span id="dir-text">LTR</span>
            </button>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-sm flex items-center justify-center hover:border-primary transition-all">
                <i id="theme-icon" class="fas fa-moon text-primary"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">
        <div class="glow absolute inset-0 pointer-events-none"></div>

        <div class="max-w-2xl w-full text-center relative z-10">
            <div class="mb-8">
                <h1 class="text-[120px] md:text-[180px] font-black leading-none tracking-tighter text-slate-200 dark:text-slate-800 animate-float select-none">
                    404
                </h1>
                <div class="text-primary font-mono text-lg md:text-xl font-bold -mt-10 md:-mt-16">
                    &lt;Error: Page_Not_Found /&gt;
                </div>
            </div>

            <h2 class="text-3xl md:text-4xl font-extrabold mb-4 tracking-tight">
                Lost in the Cloud?
            </h2>
            <p class="text-slate-500 dark:text-slate-400 text-lg mb-10 max-w-md mx-auto leading-relaxed">
                The code you're looking for has moved to another repository or never existed in this branch.
            </p>

            <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
                <a href="index.html" class="w-full sm:w-auto px-10 py-4 bg-primary text-white font-black rounded-2xl shadow-xl shadow-primary/30 hover:-translate-y-1 active:scale-95 transition-all">
                    Back to Home
                </a>
                <button onclick="window.history.back()" class="w-full sm:w-auto px-10 py-4 border-2 border-slate-200 dark:border-slate-800 font-bold rounded-2xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-all">
                    Go Back
                </button>
            </div>

            <div class="mt-16 flex flex-wrap justify-center gap-8 text-sm font-bold text-slate-400">
                <a href="documentation.html" class="hover:text-primary transition-colors">Documentation</a>
                <a href="comingsoon.html" class="hover:text-primary transition-colors">System Status</a>
                <a href="contact.html" class="hover:text-primary transition-colors">Report Issue</a>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-xs font-medium text-slate-400 uppercase tracking-[0.2em]">
        &copy; 2026 DEV BASE Ecosystem
    </footer>

    <script>
        // --- Theme Management ---
        function toggleTheme() {
            const isDark = document.documentElement.classList.toggle('dark');
            const icon = document.getElementById('theme-icon');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            icon.className = isDark ? 'fas fa-sun text-yellow-400' : 'fas fa-moon text-primary';
        }

        // --- Direction Management ---
        function toggleDir() {
            const html = document.documentElement;
            const newDir = html.dir === 'ltr' ? 'rtl' : 'ltr';
            html.dir = newDir;
            document.getElementById('dir-text').innerText = newDir.toUpperCase();
            localStorage.setItem('dir', newDir);
        }

        // --- Initialize State (Local Storage) ---
        window.onload = () => {
            // Check Theme
            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-icon').className = 'fas fa-sun text-yellow-400';
            }
            // Check Direction
            const savedDir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.dir = savedDir;
            document.getElementById('dir-text').innerText = savedDir.toUpperCase();
        }
    </script>
</body>
</html>
